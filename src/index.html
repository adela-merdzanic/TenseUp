<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recall - Choose a subject</title>
    <meta
      name="description"
      content="Recall - randomized exam practice with progress tracking. Choose a subject to start: grammar questions, essay flashcards and theory from your course materials."
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Recall" />
    <meta property="og:title" content="Recall - Exam practice" />
    <meta
      property="og:description"
      content="Randomized exam practice with progress tracking. Choose a subject to start."
    />
    <meta property="og:url" content="https://tense-up.netlify.app/" />
    <meta
      property="og:image"
      content="https://tense-up.netlify.app/assets/images/og-image.png"
    />
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="assets/images/favicon-32.png"
    />
    <link rel="apple-touch-icon" href="assets/images/apple-touch-icon.png" />
    <script>
      (function () {
        try {
          var saved = localStorage.getItem("quizTheme");
          var prefersDark =
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)").matches;
          if (saved === "dark" || (!saved && prefersDark)) {
            document.documentElement.setAttribute("data-theme", "dark");
          }
        } catch (e) {}
      })();
    </script>
    <link rel="stylesheet" href="assets/css/variables.css" />
    <link rel="stylesheet" href="assets/css/base.css" />
    <link rel="stylesheet" href="assets/css/components.css" />
    <link rel="stylesheet" href="assets/css/home.css" />
  </head>
  <body>
    <header class="app-header">
      <a href="index.html" class="app-logo">Recall</a>
      <nav class="header-nav">
        <a href="contribute.html">Contribute</a>
      </nav>
      <button
        type="button"
        id="theme-toggle"
        class="btn theme-toggle"
        aria-label="Toggle dark mode"
      >
        🌙
      </button>
    </header>

    <main class="container home-screen">
      <section class="hero">
        <h1 class="app-title">Choose a subject</h1>
        <p class="app-subtitle">
          Pick what you're studying. Each subject keeps its own progress, so a
          reset in one never touches the other.
        </p>
        <p id="picker-error" class="stats-text" hidden></p>
      </section>

      <div class="home-grid" id="subject-grid"></div>
    </main>

    <footer class="app-footer">
      <p>
        © 2026 Recall · Open source under the MIT license ·
        <a href="contribute.html">Contribute</a>
      </p>
    </footer>

    <script type="module" src="assets/js/main-picker.js"></script>
    <script type="module" src="assets/js/sw-register.js"></script>
    <!-- Cloudflare Web Analytics -->
    <script
      defer
      src="https://static.cloudflareinsights.com/beacon.min.js"
      data-cf-beacon='{"token": "2d894505941446eaa9881d46d337e4bb"}'
    ></script>
    <!-- End Cloudflare Web Analytics -->
  </body>
</html>
